<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Treino Corrida" />
    <title>Treino Corrida</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <main id="view-container"></main>

      <nav class="bottom-nav" id="bottom-nav" aria-label="Navegação principal">
        <a href="#plans" class="nav-item" data-tab="plans" aria-label="Planos">
          <span class="nav-icon" aria-hidden="true">🏠</span>
          <span class="nav-label">Planos</span>
        </a>
        <a href="#logs" class="nav-item" data-tab="logs" aria-label="Treinos">
          <span class="nav-icon" aria-hidden="true">📋</span>
          <span class="nav-label">Treinos</span>
        </a>
        <a href="#evolution" class="nav-item" data-tab="evolution" aria-label="Evolução">
          <span class="nav-icon" aria-hidden="true">📈</span>
          <span class="nav-label">Evolução</span>
        </a>
        <a href="#config" class="nav-item" data-tab="config" aria-label="Config">
          <span class="nav-icon" aria-hidden="true">⚙️</span>
          <span class="nav-label">Config</span>
        </a>
      </nav>
    </div>

    <dialog id="import-dialog">
      <form method="dialog" class="import-form">
        <h2>Importar backup</h2>
        <p class="dialog-subtitle">Cole o JSON ou selecione um arquivo.</p>
        <textarea id="import-text" rows="8" placeholder='{ "version": 2, ... }'></textarea>
        <label for="import-file">Arquivo JSON</label>
        <input id="import-file" type="file" accept="application/json,.json" />
        <div class="dialog-actions">
          <button type="button" id="import-cancel" class="btn-ghost">Cancelar</button>
          <button type="button" id="import-confirm" class="btn-primary">Importar</button>
        </div>
      </form>
    </dialog>

    <script src="./vendor/chart.umd.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
